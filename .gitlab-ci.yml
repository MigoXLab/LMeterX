variables:
  PROJECT: qa
  SERVICE_NAME: lmeterx-be
  SERVICE_NAME_FE: lmeterx-fe
  SERVICE_NAME_ENGINE: lmeterx-engine
  PROJECT_CLONE_DIR: /tmp/project-code # 代码克隆目录
  REPORT_FILE: report.md # 报告文件名

stages:
  - build
  - deploy-be-qa
  - deploy-fe-qa
  - deploy-engine-qa
  - deploy-be-dev
  - deploy-fe-dev
  - deploy-engine-dev
  - deploy-be-s
  - deploy-fe-s
  - deploy-engine-s
  - pr_agent
  - code_quality_check

build-be:
  stage: build
  image: eng-center-registry.cn-shanghai.cr.aliyuncs.com/public/docker-git:latest
  retry: 2
  tags:
    - ecs
  before_script:
    - docker login -u $harbor_user -p $harbor_password $harbor_url_prod_vpc
  script:
    - echo "Build backend."
    - docker build  -t $harbor_url_prod_vpc/$PROJECT/$SERVICE_NAME:${CI_COMMIT_SHA:0:8} -f backend/Dockerfile.k8s .
    - docker push $harbor_url_prod_vpc/$PROJECT/$SERVICE_NAME:${CI_COMMIT_SHA:0:8}
    - docker rmi $harbor_url_prod_vpc/$PROJECT/$SERVICE_NAME:${CI_COMMIT_SHA:0:8}
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "dev"'
      when: on_success
      allow_failure: false

build-engine:
  stage: build
  image: eng-center-registry.cn-shanghai.cr.aliyuncs.com/public/docker-git:latest
  retry: 2
  tags:
    - ecs
  before_script:
    - docker login -u $harbor_user -p $harbor_password $harbor_url_prod_vpc
  script:
    - echo "Build engine."
    - docker build  -t $harbor_url_prod_vpc/$PROJECT/$SERVICE_NAME_ENGINE:${CI_COMMIT_SHA:0:8} -f st_engine/Dockerfile.k8s .
    - docker push $harbor_url_prod_vpc/$PROJECT/$SERVICE_NAME_ENGINE:${CI_COMMIT_SHA:0:8}
    - docker rmi $harbor_url_prod_vpc/$PROJECT/$SERVICE_NAME_ENGINE:${CI_COMMIT_SHA:0:8}
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "dev"'
      when: on_success
      allow_failure: false

build-fe:
  stage: build
  image: eng-center-registry.cn-shanghai.cr.aliyuncs.com/public/docker-git:latest
  retry: 2
  tags:
    - ecs
  before_script:
    - docker login -u $harbor_user -p $harbor_password $harbor_url_prod_vpc
  script:
    - echo "Build lmeterx-fe"
    - cd frontend
    - docker build  -t $harbor_url_prod_vpc/$PROJECT/$SERVICE_NAME_FE:${CI_COMMIT_SHA:0:8} -f Dockerfile.k8s .
    - docker push $harbor_url_prod_vpc/$PROJECT/$SERVICE_NAME_FE:${CI_COMMIT_SHA:0:8}
    - docker rmi $harbor_url_prod_vpc/$PROJECT/$SERVICE_NAME_FE:${CI_COMMIT_SHA:0:8}
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "dev"'
      when: on_success
      allow_failure: false

########################################################
#                        部署 【测试环境】-aliyun-qa集群
########################################################
deploy-be-qa:
  stage: deploy-be-qa
  retry: 2
  tags:
    - ecs
  image: eng-center-registry.cn-shanghai.cr.aliyuncs.com/public/dtzar/helm-kubectl
  script:
    - echo "Deploying lmeterx-be"
    - cd k8s/workloads
    - sed -i "s/_tag/${CI_COMMIT_SHA:0:8}/g" backend-deployment.yaml
    - kubectl --kubeconfig $ALIKUBE_CONFIG apply -f backend-deployment.yaml
    - echo "Application successfully deployed."
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "dev"'
      when: manual
      allow_failure: false

