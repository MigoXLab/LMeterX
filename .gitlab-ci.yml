pr_agent_job:
  stage: pr_agent
  retry: 2
  tags:
    - ecs
  image:
    name: eng-center-registry.cn-shanghai.cr.aliyuncs.com/qa/codiumai/pr-agent:0.1.3.2-intern
    entrypoint: [""]
  script:
    - cd /app
    - echo "Running PR Agent action step"
    - export MR_URL="$CI_MERGE_REQUEST_PROJECT_URL/merge_requests/$CI_MERGE_REQUEST_IID"
    - echo "MR_URL=$MR_URL"
    - export gitlab__url=https://gitlab.pjlab.org.cn
    - export gitlab__PERSONAL_ACCESS_TOKEN=$GITLAB_PERSONAL_ACCESS_TOKEN
    - export config__git_provider="gitlab"
    # - export config__model="intern-latest"
    - export config__model="gpt-5.1-codex"
    - export config__max_model_tokens="200000"
    - export config__response_language="zh-CN"
    - export config__ai_timeout="600"
    # 使用gpt外部模型，取消如下两行注释，并设置正确的环境变量值
    - export openai__key=$OPENAI_KEY
    - export openai__api_base=$OPENAI_API_BASE
    # 使用s1等内部模型，取消如下三行注释，并设置正确的环境变量值
    # - export openai__key="sk-J7ZI6MfY2vicYmjutqnuPKZ7kODas9x1vq2qD7EPpWcXHwIT"
    # - export openai__api_base="https://chat.intern-ai.org.cn/api/v1"
    # - export litellm__custom_llm_provider="openai"
    - export AUDIT_DB_HOST=$AUDIT_DB_HOST
    - export AUDIT_DB_PORT=3306
    - export AUDIT_DB_USER="pr_agent"
    - export AUDIT_DB_PASSWORD=$AUDIT_DB_PASSWORD
    - export AUDIT_DB_NAME="pr_agent"
    - export PR_AGENT_COMMANDS="${PR_AGENT_COMMANDS:-describe review improve}"
    - python -m pr_agent.servers.gitlab_ci_audit_runner
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

